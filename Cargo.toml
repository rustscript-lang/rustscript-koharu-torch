[package]
name = "rustscript-koharu-torch"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Run koharu-torch inference graphs from RustScript host functions"

[dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }
image = "0.25"
imageproc = "0.27"
koharu-runtime = { git = "https://github.com/mayocream/koharu.git", branch = "refactor/0705", package = "koharu-runtime" }
koharu-torch = { git = "https://github.com/mayocream/koharu.git", branch = "refactor/0705", package = "koharu-torch" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
vm = { package = "pd-vm", path = "../rustscript", default-features = false, features = ["runtime"] }

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "lama-rustscript"
path = "src/bin/lama.rs"
